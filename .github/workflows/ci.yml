name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
      rabbitmq:
        image: rabbitmq:3-alpine
        ports: ["5672:5672"]
      postgres:
        image: postgres:16-alpine
        ports: ["5432:5432"]
        env:
          POSTGRES_USER: vorq
          POSTGRES_PASSWORD: vorq
          POSTGRES_DB: vorq
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://vorq:vorq@localhost:5432/vorq
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Setup Prisma
        run: |
          cd packages/core
          mkdir -p node_modules/@prisma
          cp -r ../../node_modules/@prisma/client node_modules/@prisma/client
          cp -r ../../node_modules/.prisma node_modules/.prisma 2>/dev/null || true
          npx prisma generate
          npx prisma db push
      - run: npm run build
      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
